<form class="frontmatter-editor" ngNoForm (submit)="$event.preventDefault()" aria-label="Frontmatter editor">
  <h3 class="section-title" id="fm-heading">Frontmatter</h3>

  <div class="field">
    <label for="fm-module">Module</label>
    <input
      id="fm-module"
      type="text"
      [ngModel]="frontmatter().module"
      (ngModelChange)="onFieldChange('module', $event)"
      placeholder="module-name"
      autocomplete="off"
    />
  </div>

  <div class="field-row">
    <div class="field">
      <label for="fm-version">Version</label>
      <input
        id="fm-version"
        type="number"
        min="1"
        [ngModel]="frontmatter().version"
        (ngModelChange)="onFieldChange('version', $event)"
      />
    </div>
    <div class="field">
      <label for="fm-status">Status</label>
      <select
        id="fm-status"
        [ngModel]="frontmatter().status"
        (ngModelChange)="onStatusChange($event)"
      >
        <option value="draft">Draft</option>
        <option value="active">Active</option>
      </select>
    </div>
  </div>

  <fieldset class="field">
    <legend>Files</legend>
    <div class="list-items" role="list" aria-label="Added files">
      @for (file of frontmatter().files; track $index) {
        <div class="list-item" role="listitem">
          <code>{{ file }}</code>
          <button class="btn-icon" (click)="removeFile($index)" [attr.aria-label]="'Remove file ' + file">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      }
    </div>
    <div class="add-row">
      <label class="sr-only" for="fm-new-file">Add file path</label>
      <input
        id="fm-new-file"
        type="text"
        [(ngModel)]="newFile"
        placeholder="server/path/to/file.ts"
        aria-label="New file path"
        (keyup.enter)="addFile()"
        autocomplete="off"
      />
      <button class="btn btn-sm" (click)="addFile()">Add</button>
    </div>
  </fieldset>

  <fieldset class="field">
    <legend>DB Tables</legend>
    <div class="list-items" role="list" aria-label="Added database tables">
      @for (table of frontmatter().db_tables; track $index) {
        <div class="list-item" role="listitem">
          <code>{{ table }}</code>
          <button class="btn-icon" (click)="removeTable($index)" [attr.aria-label]="'Remove table ' + table">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      }
    </div>
    <div class="add-row">
      <label class="sr-only" for="fm-new-table">Add table name</label>
      <input
        id="fm-new-table"
        type="text"
        [(ngModel)]="newTable"
        placeholder="table_name"
        aria-label="New table name"
        (keyup.enter)="addTable()"
        autocomplete="off"
      />
      <button class="btn btn-sm" (click)="addTable()">Add</button>
    </div>
  </fieldset>

  <fieldset class="field">
    <legend>Dependencies</legend>
    <div class="list-items" role="list" aria-label="Added dependencies">
      @for (dep of frontmatter().depends_on; track $index) {
        <div class="list-item" role="listitem">
          <code>{{ dep }}</code>
          <button class="btn-icon" (click)="removeDependency($index)" [attr.aria-label]="'Remove dependency ' + dep">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      }
    </div>
    <div class="add-row">
      <label class="sr-only" for="fm-new-dep">Add dependency</label>
      <input
        id="fm-new-dep"
        type="text"
        [(ngModel)]="newDep"
        placeholder="module-name"
        list="dep-suggestions"
        aria-label="New dependency path"
        (keyup.enter)="addDependency()"
        autocomplete="off"
      />
      <datalist id="dep-suggestions">
        @for (mod of availableModules(); track mod) {
          <option [value]="mod"></option>
        }
      </datalist>
      <button class="btn btn-sm" (click)="addDependency()">Add</button>
    </div>
  </fieldset>
</form>
