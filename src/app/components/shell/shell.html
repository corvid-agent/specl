<div class="shell">
  <aside
    class="sidebar"
    [class.sidebar-open]="sidebarOpen()"
    role="complementary"
    aria-label="Spec navigation"
  >
    <div class="sidebar-header">
      <h1 class="logo">Specl</h1>
      <button class="btn-icon sidebar-close" (click)="toggleSidebar()" aria-label="Close sidebar">
        &times;
      </button>
    </div>
    <app-spec-list />
  </aside>
  <div
    class="sidebar-backdrop"
    [class.visible]="sidebarOpen()"
    (click)="toggleSidebar()"
    aria-hidden="true"
  ></div>
  <main id="main-content" class="content" role="main">
    <button
      class="btn-icon mobile-menu-btn"
      (click)="toggleSidebar()"
      [attr.aria-label]="sidebarOpen() ? 'Close sidebar' : 'Open sidebar'"
      [attr.aria-expanded]="sidebarOpen()"
    >
      &#9776;
    </button>
    <router-outlet />
  </main>
</div>
