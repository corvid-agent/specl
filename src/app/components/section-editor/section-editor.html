<section class="section-editor" [attr.aria-label]="'Editing section: ' + headingValue()">
  <header class="section-header">
    <div class="section-heading-row">
      <span class="heading-prefix" aria-hidden="true">##</span>
      <label class="sr-only" for="section-heading-input">Section heading</label>
      <input
        id="section-heading-input"
        class="heading-input"
        [ngModel]="headingValue()"
        (ngModelChange)="onHeadingChange($event)"
        placeholder="Section heading"
      />
    </div>
    <nav class="section-nav-buttons" aria-label="Section navigation">
      @if (hasPrev) {
        <button class="btn btn-sm" (click)="goPrev()" aria-label="Previous section">Prev</button>
      }
      @if (hasNext) {
        <button class="btn btn-sm" (click)="goNext()" aria-label="Next section">Next</button>
      }
    </nav>
  </header>

  <div class="section-body" role="region" aria-label="Markdown editor">
    <div #sectionEditorHost class="editor-host"></div>
  </div>
</section>
