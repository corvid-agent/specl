<section class="section-editor" [attr.aria-label]="'Editing section: ' + headingValue()">
  <header class="section-header">
    <div class="section-heading-row">
      <span class="heading-prefix" aria-hidden="true">##</span>
      <label class="sr-only" for="section-heading-input">Section heading</label>
      <input
        id="section-heading-input"
        class="heading-input"
        [ngModel]="headingValue()"
        (ngModelChange)="onHeadingChange($event)"
        placeholder="Section heading"
      />
    </div>
    <nav class="section-nav-buttons" aria-label="Section navigation">
      @if (hasPrev) {
        <button class="btn btn-sm" (click)="goPrev()" aria-label="Previous section">&#8592; Prev</button>
      }
      @if (hasNext) {
        <button class="btn btn-sm" (click)="goNext()" aria-label="Next section">Next &#8594;</button>
      }
    </nav>
  </header>

  <div class="section-body" role="region" aria-label="Markdown editor">
    @if (hasTable()) {
      <!-- Structured editing mode: forms for tables, textareas for text -->
      <div class="structured-content">
        @for (block of contentBlocks(); track $index; let blockIdx = $index) {
          @if (block.type === 'table' && block.table) {
            <app-table-editor
              [table]="block.table"
              (tableChange)="onTableChange(blockIdx, $event)"
            />
          } @else if (block.type === 'text') {
            <textarea
              class="text-block"
              [ngModel]="block.text ?? ''"
              (ngModelChange)="onTextBlockChange(blockIdx, $event)"
              placeholder="Enter text..."
              rows="3"
              [attr.aria-label]="'Text block ' + (blockIdx + 1)"
            ></textarea>
          }
        }
      </div>
    } @else {
      <!-- CodeMirror mode for sections without tables -->
      <div #sectionEditorHost class="editor-host"></div>
    }
  </div>
</section>
